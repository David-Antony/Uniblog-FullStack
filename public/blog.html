<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UniBlog — A full-stack blog platform for university news, announcements, and student achievements. Built with Express.js, MongoDB, and vanilla JavaScript.">
    <meta name="keywords" content="university blog, student blog, college news, announcements, achievements">
    <meta name="author" content="UniBlog">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="http://localhost:3001/blog.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://localhost:3001/blog.html">
    <meta property="og:title" content="UniBlog — Blog Editor">
    <meta property="og:description" content="A full-stack blog platform for university news, announcements, and student achievements.">
    <meta property="og:image" content="http://localhost:3001/images/news-1.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="http://localhost:3001/blog.html">
    <meta name="twitter:title" content="UniBlog — Blog Editor">
    <meta name="twitter:description" content="A full-stack blog platform for university news, announcements, and student achievements.">
    <meta name="twitter:image" content="http://localhost:3001/images/news-1.png">

    <title>UniBlog — Blog Editor</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Quicksand:wght@300;400;500;600;700&display=swap');
        :root{
            --Playfair: 'Playfair Display', serif;
            --Quicksand: 'Quicksand', sans-serif;
            --Roboto: 'Roboto', sans-serif;
            --dark: #1e1e2e;
            --exDark: #14142b;
        }
        *{
            padding: 0;
            margin: 0;
            font-family: var(--Quicksand);
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #eeede8;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background-color: #fffefc;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            position: relative;
        }
        .cancel-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background-color: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #4a4a5a;
        }
        .cancel-btn:hover {
            color: #c0392b;
        }
        h1 {
            text-align: center;
            color: #2d2d3f;
            margin-bottom: 20px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        select{
            padding: 10px;
            font-size: 16px;
            border: 1px solid #e0dfdb;
            border-radius: 5px;
            background-color: #fffefc;
            color: #1e1e2e;
        }
        label {
            font-size: 18px;
            color: #4a4a5a;
        }
        input[type="text"], textarea, input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #e0dfdb;
            border-radius: 5px;
            width: 95%;
            background-color: #faf9f6;
            color: #1e1e2e;
        }
        input[type="text"]:focus,
        textarea:focus {
            border-color: #c7901e;
            outline: none;
            background-color: #fffefc;
            box-shadow: 0 0 0 3px rgba(199, 144, 30, 0.15);
        }
        textarea {
            height: 150px;
        }
        .content-textarea {
            height: 300px;
            resize: vertical;
        }
        button {
            padding: 15px;
            background-color: #1e1e2e;
            color: #f0ede8;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4a4a5a;
            color: #ffffff;
        }
        .message {
            margin-top: 20px;
            font-size: 16px;
            color: #2d8a4e;
            text-align: center;
        }
        .ql-editor {
            min-height: 250px;
        }
    </style>
</head>
<body>
    <!-- Frosted Glass Scholar Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="container">
            <a class="navbar-brand" href="homepage.html" aria-label="Campus News and Blog Platform Home">Campus News and Blog Platform</a>
            <span id="username-display" aria-live="polite" style="margin-left: 10px; font-weight: bold;"></span>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle navigation menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
            <div class="navbar-nav" id="navbarNav">
                <a href="blog.html" id="blogLink" class="primary-cta" aria-label="Add new blog post">Add Post</a>
                <a href="#" onclick="openModal('aboutModal')" aria-label="About this platform">ABOUT</a>
                <a href="logout.html" aria-label="Logout from the platform">LOGOUT</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Cancel Button (X) at the top-right corner -->
        <button class="cancel-btn" onclick="cancelPost()" aria-label="Cancel and return to homepage">&times;</button>

        <h1 id="form-title">Add a New Blog or News Post</h1>
        <form id="addPostForm" aria-labelledby="form-title">
            <input type="hidden" id="editPostId" name="editPostId">
            <!-- Title of the post -->
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter the title" required minlength="3" maxlength="100">

            <!-- Category -->
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="Announcement">Announcement</option>
                <option value="Design">Design</option>
                <option value="News">News</option>
                <option value="General" selected>General</option>
            </select>
<!-- Image input: URL text field + Browse button -->
<label for="imageUrl">Image *</label>
<div class="image-input-group">
    <input type="text" id="imageUrl" name="imageUrl" required placeholder="Enter image URL or Browse a file">
    <button type="button" class="browse-btn" id="browseBlogImage" aria-label="Browse local image files">
        <i class="fas fa-folder-open" aria-hidden="true"></i> Browse
    </button>
</div>
<input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none;" aria-hidden="true">


            <!-- Description text area for the post -->
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Enter the description" required minlength="10" maxlength="500"></textarea>

            <!-- Full Article Content (Quill Rich Text Editor) -->
            <label for="content-editor">Full Article Content:</label>
            <div id="content-editor" style="height: 300px; background: white;"></div>

            <!-- Hidden content field as fallback -->
            <textarea id="content" name="content" style="display:none;"></textarea>

            <!-- Submit button -->
            <button type="submit" id="submitBtn" aria-label="Submit blog post">Add Post</button>

            <!-- Confirmation message -->
            <p id="message" class="message"></p>
        </form>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="scripts.js"></script>
    <script>
    const form = document.getElementById('addPostForm');
    const message = document.getElementById('message');
    const role = localStorage.getItem('role');

    // Basic guard: only admin can access this page
    if (role !== 'admin') {
        if (!role) {
            alert('Please log in first.');
            window.location.href = 'LOGIN_PAGE.html';
        } else {
            alert('Permission denied: Only admins can add posts.');
            window.location.href = 'homepage.html';
        }
    }

    // Initialize Quill rich text editor
    const quill = new Quill('#content-editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'header': [1, 2, 3, false] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });
    window.quill = quill; // Make globally accessible

    // Check if editing mode
    const urlParams = new URLSearchParams(window.location.search);
    const isEditMode = urlParams.get('edit') === 'true';
    const editPostId = sessionStorage.getItem('editPostId');
    
    if (isEditMode && editPostId) {
        // Pre-fill form with existing data
        document.getElementById('form-title').textContent = 'Edit Blog Post';
        document.getElementById('submitBtn').textContent = 'Update Post';
        document.getElementById('editPostId').value = editPostId;
        document.getElementById('title').value = sessionStorage.getItem('editPostTitle') || '';
        document.getElementById('category').value = sessionStorage.getItem('editPostCategory') || 'General';
        document.getElementById('description').value = sessionStorage.getItem('editPostDescription') || '';
        
        // Set Quill content from session storage
        const savedContent = sessionStorage.getItem('editPostContent') || '';
        quill.root.innerHTML = savedContent;
        
        // Clear sessionStorage
        sessionStorage.removeItem('editPostId');
        sessionStorage.removeItem('editPostTitle');
        sessionStorage.removeItem('editPostCategory');
        sessionStorage.removeItem('editPostDescription');
        sessionStorage.removeItem('editPostContent');
        sessionStorage.removeItem('editPostImage');
        
        // Pre-fill image URL if editing
        const editImage = sessionStorage.getItem('editPostImage') || '';
        if (editImage) {
            document.getElementById('imageUrl').value = editImage;
        }
    }

    // Setup image input group: Browse button triggers hidden file input
    (function() {
        const imageUrlInput = document.getElementById('imageUrl');
        const imageFileInput = document.getElementById('imageFile');
        const browseBtn = document.getElementById('browseBlogImage');
        
        if (browseBtn && imageFileInput) {
            browseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                imageFileInput.click();
            });
            
            imageFileInput.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                
                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file.');
                    this.value = '';
                    return;
                }
                
                const MAX_SIZE = 5 * 1024 * 1024;
                if (file.size > MAX_SIZE) {
                    alert('Image size must be less than 5MB. Please choose a smaller image.');
                    this.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageUrlInput.value = e.target.result;
                };
                reader.onerror = function() {
                    alert('Failed to read the image file. Please try again.');
                };
                reader.readAsDataURL(file);
            });
        }
    })();

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value.trim();
        const content = quill.root.innerHTML;  // Use Quill content instead of textarea
        const imageValue = document.getElementById('imageUrl').value.trim();
        const imageFile = document.getElementById('imageFile').files[0];
        const postId = document.getElementById('editPostId').value;

        // Client-side validation
        if (!title || title.length < 3) {
            alert('Title must be at least 3 characters long.');
            return;
        }
        
        if (!category) {
            alert('Please select a category.');
            return;
        }
        
        if (!description || description.length < 10) {
            alert('Description must be at least 10 characters long.');
            return;
        }
        
        // Check Quill content (strip HTML for length check)
        const plainContent = content.replace(/<[^>]*>/g, '').trim();
        if (!plainContent || plainContent.length < 20) {
            alert('Content must be at least 20 characters long.');
            return;
        }
        
        if (!imageValue) {
            alert('Please provide an image URL or select a local image file.');
            return;
        }

        // Image is already set in the URL field (either typed URL or base64 from file upload)
        await submitPost(title, category, description, content, imageValue, postId);
    });

    async function submitPost(title, category, description, content, image, postId) {
        try {
            let res, data;
            
            if (postId) {
                // Update existing post
                res = await fetch(`/posts/${postId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-role': role || '' },
                    body: JSON.stringify({ title, description, content, image, category })
                });
                data = await res.json();
                if (data.success) {
                    message.textContent = "✅ Post updated successfully!";
                } else {
                    message.textContent = "❌ Failed to update post.";
                }
            } else {
                // Create new post
                res = await fetch('/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-role': role || '' },
                    body: JSON.stringify({ title, description, content, image, category })
                });
                data = await res.json();
                if (data.success) {
                    message.textContent = "✅ Your post has been successfully added!";
                } else {
                    message.textContent = "❌ Failed to add post.";
                }
            }

            // Redirect back to homepage after a short delay
            setTimeout(() => {
                window.location.href = 'homepage.html';
            }, 1000);
        } catch (err) {
            console.error("Error submitting post:", err);
            message.textContent = "❌ Server error.";
        }
    }

    // Cancel button function
    function cancelPost() {
        if (confirm("Are you sure you want to cancel? All data will be lost.")) {
            window.location.href = "homepage.html";
        }
    }
    </script>
</body>
</html>
