<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add News or Blog</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800;900&family=Quicksand:wght@300;400;500;600;700&display=swap');
        :root{
            --Playfair: 'Playfair Display', serif;
            --Quicksand: 'Quicksand', sans-serif;
            --Roboto: 'Roboto', sans-serif;
            --dark: #3c393d;
            --exDark: #2b2b2b;
        }
        *{
            padding: 0;
            margin: 0;
            font-family: var(--Quicksand);
        }
        /* Basic styling for the form */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #888;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
            background-color: #fefefe;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            position: relative;
        }

        .cancel-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background-color: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .cancel-btn:hover {
            color: #ff4d4d;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        select{
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        label {
            font-size: 18px;
            color: #555;
        }

        input[type="text"], textarea, input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 95%;
        }

        textarea {
            height: 150px;
        }

        .content-textarea {
            height: 300px;
            resize: vertical;
        }

        button {
            padding: 15px;
            background-color: #000000;
            color: #ffffff;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #888;
            color: #000000;
        }

        .message {
            margin-top: 20px;
            font-size: 16px;
            color: green;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cancel Button (X) at the top-right corner -->
        <button class="cancel-btn" onclick="cancelPost()" aria-label="Cancel and return to homepage">&times;</button>

        <h1 id="form-title">Add a New Blog or News Post</h1>
        <form id="addPostForm" aria-labelledby="form-title">
            <input type="hidden" id="editPostId" name="editPostId">
            <!-- Title of the post -->
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="Enter the title" required minlength="3" maxlength="100">

            <!-- Category -->
            <label for="category">Category:</label>
            <select id="category" name="category" required>
                <option value="Announcement">Announcement</option>
                <option value="Design">Design</option>
                <option value="News">News</option>
                <option value="General" selected>General</option>
            </select>
<!-- Image input: URL text field + Browse button -->
<label for="imageUrl">Image *</label>
<div class="image-input-group">
    <input type="text" id="imageUrl" name="imageUrl" required placeholder="Enter image URL or Browse a file">
    <button type="button" class="browse-btn" id="browseBlogImage" aria-label="Browse local image files">
        <i class="fas fa-folder-open" aria-hidden="true"></i> Browse
    </button>
</div>
<input type="file" id="imageFile" name="imageFile" accept="image/*" style="display:none;" aria-hidden="true">


            <!-- Description text area for the post -->
            <label for="description">Description:</label>
            <textarea id="description" name="description" placeholder="Enter the description" required minlength="10" maxlength="500"></textarea>

            <!-- Content text area for the post -->
            <label for="content">Full Article Content:</label>
            <textarea id="content" name="content" class="content-textarea" placeholder="Enter the full article content (shown in 'Read More' modal)" required minlength="20"></textarea>

            <!-- Submit button -->
            <button type="submit" id="submitBtn" aria-label="Submit blog post">Add Post</button>

            <!-- Confirmation message -->
            <p id="message" class="message"></p>
        </form>
    </div>


    <script>
    const form = document.getElementById('addPostForm');
    const message = document.getElementById('message');
    const role = localStorage.getItem('role');

    // Basic guard: only admin can access this page
    if (role !== 'admin') {
        if (!role) {
            alert('Please log in first.');
            window.location.href = 'LOGIN_PAGE.html';
        } else {
            alert('Permission denied: Only admins can add posts.');
            window.location.href = 'homepage.html';
        }
    }

    // Check if editing mode
    const urlParams = new URLSearchParams(window.location.search);
    const isEditMode = urlParams.get('edit') === 'true';
    const editPostId = sessionStorage.getItem('editPostId');
    
    if (isEditMode && editPostId) {
        // Pre-fill form with existing data
        document.getElementById('form-title').textContent = 'Edit Blog Post';
        document.getElementById('submitBtn').textContent = 'Update Post';
        document.getElementById('editPostId').value = editPostId;
        document.getElementById('title').value = sessionStorage.getItem('editPostTitle') || '';
        document.getElementById('category').value = sessionStorage.getItem('editPostCategory') || 'General';
        document.getElementById('description').value = sessionStorage.getItem('editPostDescription') || '';
        document.getElementById('content').value = sessionStorage.getItem('editPostContent') || '';
        
        // Clear sessionStorage
        sessionStorage.removeItem('editPostId');
        sessionStorage.removeItem('editPostTitle');
        sessionStorage.removeItem('editPostCategory');
        sessionStorage.removeItem('editPostDescription');
        sessionStorage.removeItem('editPostContent');
        sessionStorage.removeItem('editPostImage');
        
        // Pre-fill image URL if editing
        const editImage = sessionStorage.getItem('editPostImage') || '';
        if (editImage) {
            document.getElementById('imageUrl').value = editImage;
        }
    }

    // Setup image input group: Browse button triggers hidden file input
    (function() {
        const imageUrlInput = document.getElementById('imageUrl');
        const imageFileInput = document.getElementById('imageFile');
        const browseBtn = document.getElementById('browseBlogImage');
        
        if (browseBtn && imageFileInput) {
            browseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                imageFileInput.click();
            });
            
            imageFileInput.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                
                if (!file.type.startsWith('image/')) {
                    alert('Please select a valid image file.');
                    this.value = '';
                    return;
                }
                
                const MAX_SIZE = 5 * 1024 * 1024;
                if (file.size > MAX_SIZE) {
                    alert('Image size must be less than 5MB. Please choose a smaller image.');
                    this.value = '';
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageUrlInput.value = e.target.result;
                };
                reader.onerror = function() {
                    alert('Failed to read the image file. Please try again.');
                };
                reader.readAsDataURL(file);
            });
        }
    })();

    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const title = document.getElementById('title').value.trim();
        const category = document.getElementById('category').value;
        const description = document.getElementById('description').value.trim();
        const content = document.getElementById('content').value.trim();
        const imageValue = document.getElementById('imageUrl').value.trim();
        const imageFile = document.getElementById('imageFile').files[0];
        const postId = document.getElementById('editPostId').value;

        // Client-side validation
        if (!title || title.length < 3) {
            alert('Title must be at least 3 characters long.');
            return;
        }
        
        if (!category) {
            alert('Please select a category.');
            return;
        }
        
        if (!description || description.length < 10) {
            alert('Description must be at least 10 characters long.');
            return;
        }
        
        if (!content || content.length < 20) {
            alert('Content must be at least 20 characters long.');
            return;
        }
        
        if (!imageValue) {
            alert('Please provide an image URL or select a local image file.');
            return;
        }

        // Image is already set in the URL field (either typed URL or base64 from file upload)
        await submitPost(title, category, description, content, imageValue, postId);
    });

    async function submitPost(title, category, description, content, image, postId) {
        try {
            let res, data;
            
            if (postId) {
                // Update existing post
                res = await fetch(`/posts/${postId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-role': role || '' },
                    body: JSON.stringify({ title, description, content, image, category })
                });
                data = await res.json();
                if (data.success) {
                    message.textContent = "✅ Post updated successfully!";
                } else {
                    message.textContent = "❌ Failed to update post.";
                }
            } else {
                // Create new post
                res = await fetch('/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-role': role || '' },
                    body: JSON.stringify({ title, description, content, image, category })
                });
                data = await res.json();
                if (data.success) {
                    message.textContent = "✅ Your post has been successfully added!";
                } else {
                    message.textContent = "❌ Failed to add post.";
                }
            }

            // Redirect back to homepage after a short delay
            setTimeout(() => {
                window.location.href = 'homepage.html';
            }, 1000);
        } catch (err) {
            console.error("Error submitting post:", err);
            message.textContent = "❌ Server error.";
        }
    }

    // Cancel button function
    function cancelPost() {
        if (confirm("Are you sure you want to cancel? All data will be lost.")) {
            window.location.href = "homepage.html";
        }
    }
    </script>
</body>
</html>
