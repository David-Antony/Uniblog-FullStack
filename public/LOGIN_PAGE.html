<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="UniBlog — Login to access the full-stack blog platform for university news, announcements, and student achievements.">
    <meta name="keywords" content="university blog, student blog, college news, login, announcements, achievements">
    <meta name="author" content="UniBlog">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="http://localhost:3001/LOGIN_PAGE.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://localhost:3001/LOGIN_PAGE.html">
    <meta property="og:title" content="UniBlog — Login">
    <meta property="og:description" content="Login to access the full-stack blog platform for university news, announcements, and student achievements.">
    <meta property="og:image" content="http://localhost:3001/images/news-1.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="http://localhost:3001/LOGIN_PAGE.html">
    <meta name="twitter:title" content="UniBlog — Login">
    <meta name="twitter:description" content="Login to access the full-stack blog platform for university news, announcements, and student achievements.">
    <meta name="twitter:image" content="http://localhost:3001/images/news-1.png">

    <title>UniBlog — Login</title>
    <style>
        /* General styling */
        :root {
            --mx: 50%;
            --my: 50%;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: radial-gradient(circle at var(--mx) var(--my), rgba(199,144,30,0.18), rgba(18,18,30,0.15) 32%, #12121e 65%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(255,255,255,0.06), rgba(255,255,255,0));
            filter: blur(40px);
            top: -120px;
            right: -80px;
            pointer-events: none;
        }

        .container {
            background-color: #fffefc;
            padding: 44px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 24px 64px rgba(30, 30, 46, 0.12);
            border-radius: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #1e1e2e;
        }

        .auth-switcher {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 0 0 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #e0dfdb;
            background: #faf9f6;
            color: #4a4a5a;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: #1e1e2e;
            color: #f0ede8;
            border-color: #1e1e2e;
        }

        .auth-panel {
            display: none;
        }

        .auth-panel.active {
            display: block;
        }

        .auth-note {
            margin-top: -8px;
            margin-bottom: 18px;
            font-size: 13px;
            color: #6b6b7a;
            text-align: left;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 16px;
            margin-bottom: 8px;
            text-align: left;
            color: #4a4a5a;
        }

        input[type="text"],
        .password-wrap input[type="password"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0dfdb;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            background-color: #faf9f6;
            color: #1e1e2e;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            padding-right: 44px;
        }

        input[type="text"]:focus,
        .password-wrap input[type="password"]:focus {
            border-color: #c7901e;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(199, 144, 30, 0.2);
        }

        .password-wrap{
            position: relative;
        }
        .eye-btn{
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 5px;
            color: #6b6b7a;
            font-size: 18px;
            line-height: 1;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            transition: color 0.2s ease, background-color 0.2s ease;
        }
        .eye-btn:hover{
            color: #c7901e;
            background-color: rgba(199, 144, 30, 0.1);
        }
        .eye-btn:active{
            color: #b07d15;
        }

        button {
            padding: 15px;
            font-size: 16px;
            background-color: #1e1e2e;
            color: #f0ede8;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background-color: #c7901e;
            color: #1a1a28;
            box-shadow: 0 12px 28px rgba(30, 30, 46, 0.12);
        }

        #error-message {
            margin-top: 20px;
            color: #c0392b;
            font-size: 14px;
        }

        /* Styling for small screens */
        @media (max-width: 600px) {
            .container {
                width: 90%;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="container">
        <h1>Login</h1>
        <div class="auth-switcher" role="tablist" aria-label="Authentication options">
            <button type="button" class="auth-tab active" id="loginTab" aria-selected="true">Login</button>
            <button type="button" class="auth-tab" id="signupTab" aria-selected="false">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-panel active" action="/login" method="POST">
            <label for="loginUsername">Username:</label>
            <input type="text" id="loginUsername" name="username" required>
            <label for="loginPassword">Password:</label>
            <div class="password-wrap">
                <input type="password" id="loginPassword" name="password" required>
                <button type="button" class="eye-btn" id="toggleLoginPassword" aria-label="Show password">👁️</button>
            </div>
            <button type="submit" aria-label="Login to your account">Login</button>
        </form>

        <form id="signupForm" class="auth-panel" action="/signup" method="POST">
            <p class="auth-note">New accounts are created as student users by default.</p>
            <label for="signupUsername">Username:</label>
            <input type="text" id="signupUsername" name="username" required>
            <label for="signupPassword">Password:</label>
            <div class="password-wrap">
                <input type="password" id="signupPassword" name="password" required>
                <button type="button" class="eye-btn" id="toggleSignupPassword" aria-label="Show password">👁️</button>
            </div>
            <label for="confirmPassword">Confirm Password:</label>
            <div class="password-wrap">
                <input type="password" id="confirmPassword" name="confirmPassword" required>
                <button type="button" class="eye-btn" id="toggleConfirmPassword" aria-label="Show password">👁️</button>
            </div>
            <button type="submit" aria-label="Create your account">Create Account</button>
        </form>
        <p id="error-message" style="color: red;"></p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const errorMessage = document.getElementById('error-message');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginPasswordInput = document.getElementById('loginPassword');
        const signupPasswordInput = document.getElementById('signupPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const toggleLoginPassword = document.getElementById('toggleLoginPassword');
        const toggleSignupPassword = document.getElementById('toggleSignupPassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        let loginVisible = false;
        let signupVisible = false;
        let confirmVisible = false;

        function setActiveTab(mode) {
            const loginMode = mode === 'login';
            loginForm.classList.toggle('active', loginMode);
            signupForm.classList.toggle('active', !loginMode);
            loginTab.classList.toggle('active', loginMode);
            signupTab.classList.toggle('active', !loginMode);
            loginTab.setAttribute('aria-selected', loginMode ? 'true' : 'false');
            signupTab.setAttribute('aria-selected', loginMode ? 'false' : 'true');
            errorMessage.textContent = '';
        }

        loginTab.addEventListener('click', () => setActiveTab('login'));
        signupTab.addEventListener('click', () => setActiveTab('signup'));

        function applyVisibility(input, forceVisible, lockedVisible) {
            const show = forceVisible || lockedVisible;
            input.type = show ? 'text' : 'password';
        }

        function bindPasswordToggle(button, input, stateGetter, stateSetter) {
            button.addEventListener('mousedown', () => applyVisibility(input, true, stateGetter()));
            button.addEventListener('mouseup', () => applyVisibility(input, false, stateGetter()));
            button.addEventListener('mouseleave', () => applyVisibility(input, false, stateGetter()));
            button.addEventListener('click', () => {
                stateSetter(!stateGetter());
                applyVisibility(input, false, stateGetter());
            });
        }

        bindPasswordToggle(toggleLoginPassword, loginPasswordInput, () => loginVisible, (value) => loginVisible = value);
        bindPasswordToggle(toggleSignupPassword, signupPasswordInput, () => signupVisible, (value) => signupVisible = value);
        bindPasswordToggle(toggleConfirmPassword, confirmPasswordInput, () => confirmVisible, (value) => confirmVisible = value);

        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            errorMessage.textContent = "";

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('username', data.username);
                    window.location.href = "homepage.html";
                } else {
                    errorMessage.textContent = data.message || "Invalid username or password.";
                }
            } catch (err) {
                console.error("Login error:", err);
                errorMessage.textContent = "Server unreachable. Please try again.";
            }
        });

        signupForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            errorMessage.textContent = "";

            const username = document.getElementById('signupUsername').value.trim();
            const password = document.getElementById('signupPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (password !== confirmPassword) {
                errorMessage.textContent = "Passwords do not match.";
                return;
            }

            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('username', data.username);
                    window.location.href = "homepage.html";
                } else {
                    errorMessage.textContent = data.message || "Could not create account.";
                }
            } catch (err) {
                console.error("Signup error:", err);
                errorMessage.textContent = "Server unreachable. Please try again.";
            }
        });

        // interactive cursor glow
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mx', `${x}%`);
            document.documentElement.style.setProperty('--my', `${y}%`);
        });

        setActiveTab('login');
    </script>
</body>
</html>
